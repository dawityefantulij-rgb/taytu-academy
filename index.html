<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taytu Academy - Teacher Dawit</title>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #27ae60; --g: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: var(--p); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=1000'); height: 200px; background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; border-radius: 0 0 20px 20px; }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
        .gallery img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 2px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background: var(--s); color: white; }
        .btn { background: var(--a); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        input, select, textarea { width: 95%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <div onclick="showTab('home')" style="cursor:pointer; font-weight:bold;">ጣይቱ ብጡል አካዳሚ</div>
    <div>
        <a onclick="showTab('home')" style="color:white; text-decoration:none; margin-right:15px; cursor:pointer;">Home</a>
        <button onclick="openLogin()" style="background:var(--g); border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">Admin Login</button>
    </div>
</nav>

<div id="home" class="tab-content container">
    <div class="hero">
        <h1>ጣይቱ ብጡል አካዳሚ</h1>
        <p>መምህር ዳዊት የማነ - የስነ-ጥበባት ትምህርት ክፍል</p>
    </div>

    <div class="card">
        <h3>🎨 የኪነ-ጥበብ ስራዎች ጋለሪ</h3>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1545670723-196ed0954986?w=300">
            <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?w=300">
            <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=300">
        </div>
    </div>

    <div class="card">
        <h3>📩 የአስተያየትና መረጃ መቀበያ</h3>
        <label>ስምዎ፡</label><input type="text" id="pName">
        <label>የሚፈልጉት መረጃ፡</label><textarea id="pInfo" placeholder="ለምሳሌ፡ የተማሪ ውጤት፣ የክለብ መረጃ..."></textarea>
        <label>መረጃው በምን ይላክልዎት?</label>
        <select id="pMethod">
            <option value="Telegram">በቴሌግራም</option>
            <option value="Email">በኢሜይል</option>
        </select>
        <button class="btn" onclick="sendToInbox()">መልዕክት ላክ</button>
    </div>
</div>

<div id="adminArea" class="tab-content hidden container">
    <div class="card" style="background: #f0f4f8;">
        <h3>📥 Inbox (የመጡ መልዕክቶች)</h3>
        <div id="inboxList"><i>መልዕክት የለም...</i></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3>የተማሪዎች ውጤት መመዝገቢያ</h3>
            <div>
                <button onclick="saveToFile()" style="background:var(--s); color:white; border:none; padding:8px 15px; border-radius:5px; margin-right:5px; cursor:pointer;">💾 Save Records</button>
                <button onclick="location.reload()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
            </div>
        </div>
        <br>
        <div style="overflow-x:auto">
            <table id="scoreTable">
                <thead>
                    <tr><th>ተ.ቁ</th><th>ስም</th><th>ጾታ</th><th>20%</th><th>5%</th><th>10%</th><th>10%</th><th>15%</th><th>60%</th><th>40%</th><th>100%</th><th>-</th></tr>
                </thead>
                <tbody id="sList"></tbody>
            </table>
        </div>
        <button onclick="addRow()" style="width:100%; margin-top:10px; padding:10px; background:var(--g); border:none; font-weight:bold; cursor:pointer;">+ አዲስ ተማሪ ጨምር</button>
    </div>
</div>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:2000">
    <div class="card" style="width:280px; text-align:center">
        <h4>Admin Password</h4>
        <input type="password" id="passIn" placeholder="Password">
        <button class="btn" onclick="checkAuth()" style="width:100%">ግባ</button>
        <p onclick="document.getElementById('loginOverlay').style.display='none'" style="color:red; cursor:pointer;">ዝጋ</p>
    </div>
</div>

<script>
    const AUTH = "Dawit@0721";
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function openLogin() { document.getElementById('loginOverlay').style.display='flex'; }
    function checkAuth() { if(document.getElementById('passIn').value === AUTH) { showTab('adminArea'); document.getElementById('loginOverlay').style.display='none'; } else { alert("ስህተት!"); } }

    function sendToInbox() {
        const name = document.getElementById("pName").value;
        const info = document.getElementById("pInfo").value;
        const method = document.getElementById("pMethod").value;
        if(!name || !info) return alert("እባክዎ መረጃዎቹን ይሙሉ!");
        const list = document.getElementById("inboxList");
        if(list.innerText.includes("መልዕክት የለም")) list.innerHTML = "";
        list.innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px; border-radius:5px; border-left:4px solid var(--s)"><b>ከ ${name}:</b> ${info} <br> <small>መላኪያ፡ ${method}</small></div>`;
        alert("መልዕክትዎ ተልኳል!");
        document.getElementById("pName").value = ""; document.getElementById("pInfo").value = "";
    }

    function addRow() {
        const list = document.getElementById("sList");
        const n = list.rows.length + 1;
        const row = list.insertRow();
        row.innerHTML = `<td>${n}</td><td><input type="text" placeholder="ስም"></td><td><select><option>M</option><option>F</option></select></td><td><input type="number" class="sc" oninput="clc()"></td><td><input type="number" class="sc" oninput="clc()"></td><td><input type="number" class="sc" oninput="clc()"></td><td><input type="number" class="sc" oninput="clc()"></td><td><input type="number" class="sc" oninput="clc()"></td><td class="s60">0</td><td><input type="number" class="fn" oninput="clc()"></td><td class="st">0</td><td><button onclick="this.parentElement.parentElement.remove(); clc()">x</button></td>`;
    }

    function clc() {
        document.querySelectorAll("#sList tr").forEach(row => {
            let s60 = 0; row.querySelectorAll('.sc').forEach(i => s60 += (parseFloat(i.value) || 0));
            row.querySelector('.s60').innerText = s60.toFixed(1);
            let st = s60 + (parseFloat(row.querySelector('.fn').value) || 0);
            row.querySelector('.st').innerText = st.toFixed(1);
        });
    }

    function saveToFile() {
        let data = "Student Records - Taytu Academy\n\n";
        document.querySelectorAll("#sList tr").forEach(row => {
            const name = row.cells[1].querySelector('input').value;
            const total = row.cells[10].innerText;
            data += `${name}: Total ${total}\n`;
        });
        const blob = new Blob([data], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'students_results.txt';
        a.click();
    }
</script>
</body>
</html>
