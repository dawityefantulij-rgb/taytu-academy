
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የታይቱ ቢቱል አካዳሚ - የውጤት መመዝገቢያ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #f3f4f6; }
        .grade-card { transition: transform 0.2s; cursor: pointer; }
        .grade-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-blue-800">የታይቱ ቢቱል አካዳሚ</h1>
            <p class="text-gray-600">የተማሪዎች ውጤት መቆጣጠሪያ (Cloud Sync)</p>
            <div id="syncStatus" class="mt-2 text-sm font-medium text-blue-500">መረጃ እየተፈተሸ ነው...</div>
        </header>

        <div id="gradeSelection" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            </div>

        <div id="studentSection" class="hidden bg-white p-6 rounded-lg shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 id="selectedGradeTitle" class="text-xl font-bold text-gray-800"></h2>
                <button onclick="backToGrades()" class="text-blue-600 hover:underline">ተመለስ</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="p-3 border">ተ.ቁ</th>
                            <th class="p-3 border">የተማሪ ስም</th>
                            <th class="p-3 border">ውጤት (100%)</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>

            <div class="mt-6 flex gap-4">
                <button onclick="saveToCloud()" id="saveBtn" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">መረጃውን መዝግብ (Save)</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwJ56hcG_ywKTV4k_pWI7hediy40q27Y2q6IjePHMbW2umfwkNUoZXyuiwuBSLn4hxxjw/exec';
        let currentGrade = null;
        let allData = {};

        // ገጹ ሲከፈት መረጃውን ከCloud ያመጣል
        window.onload = async () => {
            renderGrades();
            await fetchDataFromCloud();
        };

        function renderGrades() {
            const container = document.getElementById('gradeSelection');
            for (let i = 1; i <= 6; i++) {
                container.innerHTML += `
                    <div onclick="showGrade(${i})" class="grade-card bg-white p-6 rounded-xl shadow text-center border-2 border-transparent hover:border-blue-500">
                        <span class="text-2xl font-bold text-blue-700">${i}ኛ ክፍል</span>
                    </div>
                `;
            }
        }

        async function fetchDataFromCloud() {
            document.getElementById('syncStatus').innerText = "የቅርብ ጊዜ መረጃ ከCloud እየመጣ ነው...";
            try {
                const response = await fetch(scriptURL + "?action=read");
                const cloudData = await response.json();
                if (Object.keys(cloudData).length > 0) {
                    allData = cloudData;
                    document.getElementById('syncStatus').innerText = "✅ መረጃው ታድሷል (Synced)";
                }
            } catch (e) {
                document.getElementById('syncStatus').innerText = "⚠️ ከመስመር ውጭ (Offline) - Local መረጃ ይታያል";
                const local = localStorage.getItem('taytuData');
                if (local) allData = JSON.parse(local);
            }
        }

        function showGrade(grade) {
            currentGrade = grade;
            document.getElementById('gradeSelection').classList.add('hidden');
            document.getElementById('studentSection').classList.remove('hidden');
            document.getElementById('selectedGradeTitle').innerText = grade + "ኛ ክፍል ውጤት መሙያ";
            
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';
            
            // 10 ተማሪዎች ለምሳሌ
            for (let i = 1; i <= 10; i++) {
                const savedValue = (allData[grade] && allData[grade][i]) ? allData[grade][i] : '';
                tbody.innerHTML += `
                    <tr>
                        <td class="p-3 border">${i}</td>
                        <td class="p-3 border">ተማሪ ${i}</td>
                        <td class="p-3 border">
                            <input type="number" onchange="updateValue(${i}, this.value)" value="${savedValue}" 
                                class="w-full p-1 border rounded focus:outline-blue-500" placeholder="0-100">
                        </td>
                    </tr>
                `;
            }
        }

        function updateValue(studentId, value) {
            if (!allData[currentGrade]) allData[currentGrade] = {};
            allData[currentGrade][studentId] = value;
            localStorage.setItem('taytuData', JSON.stringify(allData));
        }

        async function saveToCloud() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "በመላክ ላይ...";
            btn.disabled = true;

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ grade: currentGrade, students: allData[currentGrade] })
                });
                alert("ለ " + currentGrade + "ኛ ክፍል መረጃው በስኬት ተቀምጧል!");
            } catch (e) {
                alert("ስህተት ተከስቷል! ኢንተርኔት መኖሩን ያረጋግጡ።");
            } finally {
                btn.innerText = "መረጃውን መዝግብ (Save)";
                btn.disabled = false;
            }
        }

        function backToGrades() {
            document.getElementById('gradeSelection').classList.remove('hidden');
            document.getElementById('studentSection').classList.add('hidden');
        }
    </script>
</body>
</html>
