        const grade = document.getElementById("gradeSelect").value;
        const body = document.getElementById("studentBody");

        if (sData[grade]) {
            sData[grade].forEach((s, i) => {
                body.innerHTML += `<tr><td>${i+1}</td><td>${s[0]}</td><td>${s[1]}</td><td><input type="number" step="0.1"></td></tr>`;
            });
        }
    }
