<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taytu Academy - Teacher Dawit</title>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #27ae60; --g: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: var(--p); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1200px; margin: auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=1000'); height: 160px; background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; border-radius: 15px; text-align: center; }
        
        /* Input ስፋት ማስተካከያ */
        input[type="text"].name-input { width: 250px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        input[type="number"] { width: 55px; padding: 8px; text-align: center; border: 1px solid #ddd; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--s); color: white; }
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #ddd; }

        .btn { background: var(--a); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .btn-save { background: #8e44ad; width: 100%; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

<nav>
    <div onclick="location.reload()" style="cursor:pointer; font-weight:bold; font-size:1.2rem;">ጣይቱ ብጡል አካዳሚ</div>
    <button onclick="openLogin()" style="background:var(--g); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">Admin Login</button>
</nav>

<div id="homePage" class="container">
    <div class="hero">
        <h1>ጣይቱ ብጡል አካዳሚ</h1>
        <p>መምህር ዳዊት የማነ - የስነ-ጥበባት ትምህርት ክፍል</p>
    </div>

    <div class="card">
        <h3>📩 የወላጆች መረጃ መጠየቂያ</h3>
        <label>ሙሉ ስምዎ፡</label><br>
        <input type="text" id="pName" class="name-input" placeholder="የእርሶ ስም..."><br><br>
        <label>የሚፈልጉት መረጃ፡</label><br>
        <textarea id="pInfo" style="width:95%; height:80px; padding:10px; border-radius:5px; border:1px solid #ccc;" placeholder="ለምሳሌ፡ የተማሪ ውጤት..."></textarea><br><br>
        <label>መረጃው በምን ይላክልዎት?</label><br>
        <select id="pMethod" style="width:98%; padding:10px; margin-bottom:15px;">
            <option>በቴሌግራም መልሱልኝ</option>
            <option>በኢሜይል መልሱልኝ</option>
        </select><br>
        <button class="btn" onclick="sendToInbox()">መልዕክት ላክ</button>
    </div>
</div>

<div id="adminArea" class="container hidden">
    <div class="card" style="background:#f0f4f8;">
        <h3>📥 Inbox (ከወላጆች የመጡ መልዕክቶች)</h3>
        <div id="inboxList"><i>ምንም መልዕክት የለም...</i></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3>የተማሪዎች ውጤት መመዝገቢያ</h3>
            <button onclick="location.reload()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:5px;">Logout</button>
        </div>

        <select id="gradeSel" onchange="loadStudents()" style="width:100%; padding:12px; font-weight:bold; margin-bottom:15px;">
            <option value="">-- ክፍል ይምረጡ --</option>
            <option value="6">Grade 6</option><option value="5">Grade 5</option>
            <option value="4">Grade 4</option><option value="3">Grade 3</option>
            <option value="2A">Grade 2A</option><option value="2B">Grade 2B</option>
            <option value="1A">Grade 1A</option><option value="1B">Grade 1B</option>
        </select>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ተ.ቁ</th><th style="min-width:250px;">ስም</th><th>ጾታ</th>
                        <th>20%</th><th>5%</th><th>10%</th><th>10%</th><th>15%</th>
                        <th>60%</th><th>40%</th><th>100%</th><th>-</th>
                    </tr>
                </thead>
                <tbody id="sList"></tbody>
            </table>
        </div>
        <button onclick="addRow()" style="width:100%; margin-top:10px; padding:12px; background:var(--g); border:none; font-weight:bold; cursor:pointer;">+ አዲስ ተማሪ ጨምር</button>
        
        <button class="btn btn-save" onclick="saveToSheets()">💾 Save to Google Sheets</button>

        <div class="card" style="background:#fffde7; margin-top:25px; border:1px solid var(--g);">
            <h4>📊 የውጤት ትንተና (Analysis)</h4>
            <div id="analysisResult">መረጃ አልተሞላም...</div>
        </div>
    </div>
</div>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:2000">
    <div class="card" style="width:300px; text-align:center">
        <h4>Admin Login</h4>
        <input type="password" id="passIn" placeholder="Password" style="width:90%; padding:10px;">
        <button class="btn" style="width:100%; margin-top:10px;" onclick="checkAuth()">ግባ</button>
    </div>
</div>

<script>
    const AUTH = "Dawit@0721";
    const STUDENTS = {
        "6": [["DAGIM SHEWAFERA","M"],["KALKIDAN FANTU","F"],["HERAN DIBEKULU","F"],["NATANEM ABAYNEH","M"],["DAWIT WORKE","M"]],
        "3": [["ABENEZER AMBERBIR","M"],["ABSALAT SOLOMON","F"],["AFOMIYA MESFIN","F"],["AMANUEL GIZACHEW","M"],["YARED WORKE","M"]],
        "1A": [["ABENEZER SEIFE","M"],["ABRHAM KETEMA","M"],["EDEN ABERA","F"],["HASET ABAYNEH","F"]]
    };

    function openLogin() { document.getElementById('loginOverlay').style.display='flex'; }
    function checkAuth() { 
        if(document.getElementById('passIn').value === AUTH) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('adminArea').classList.remove('hidden');
            document.getElementById('loginOverlay').style.display='none';
        } else { alert("ስህተት!"); }
    }

    function sendToInbox() {
        const name = document.getElementById("pName").value;
        const info = document.getElementById("pInfo").value;
        const method = document.getElementById("pMethod").value;
        if(!name || !info) return alert("እባክዎ መረጃ ይሙሉ!");
        const list = document.getElementById("inboxList");
        if(list.innerText.includes("ምንም መልዕክት")) list.innerHTML = "";
        list.innerHTML += `<div style="background:white; padding:10px; margin-bottom:8px; border-radius:5px; border-left:5px solid var(--s)"><b>ከ ${name}:</b> ${info} <br><small>መቀበያ፡ ${method}</small></div>`;
        alert("መልዕክትዎ ተልኳል!");
        document.getElementById("pName").value=""; document.getElementById("pInfo").value="";
    }

    function loadStudents() {
        const g = document.getElementById("gradeSel").value;
        const list = document.getElementById("sList");
        list.innerHTML = "";
        if(STUDENTS[g]) STUDENTS[g].forEach((s, i) => insertRow(i+1, s[0], s[1]));
        calc();
    }

    function addRow() { insertRow(document.getElementById("sList").rows.length + 1, "", "M"); }

    function insertRow(n, s, g) {
        document.getElementById("sList").innerHTML += `<tr><td>${n}</td><td><input type="text" class="name-input" value="${s}"></td><td><select class="gn"><option value="M" ${g=='M'?'selected':''}>M</option><option value="F" ${g=='F'?'selected':''}>F</option></select></td><td><input type="number" class="sc" oninput="calc()"></td><td><input type="number" class="sc" oninput="calc()"></td><td><input type="number" class="sc" oninput="calc()"></td><td><input type="number" class="sc" oninput="calc()"></td><td><input type="number" class="sc" oninput="calc()"></td><td class="s60">0</td><td><input type="number" class="fn" oninput="calc()"></td><td class="st">0</td><td><button onclick="this.parentElement.parentElement.remove(); calc()">x</button></td></tr>`;
    }

    function calc() {
        let m=0, mp=0, f=0, fp=0;
        document.querySelectorAll("#sList tr").forEach(row => {
            let gen = row.querySelector(".gn").value;
            let s60 = 0; row.querySelectorAll('.sc').forEach(i => s60 += (parseFloat(i.value) || 0));
            row.querySelector('.s60').innerText = s60.toFixed(1);
            let st = s60 + (parseFloat(row.querySelector('.fn').value) || 0);
            row.querySelector('.st').innerText = st.toFixed(1);
            if(gen === "M") { m++; if(st>=50) mp++; } else { f++; if(st>=50) fp++; }
        });
        document.getElementById("analysisResult").innerHTML = `<b>ወንድ፡</b> ያለፈ ${mp}/${m} (${(mp/(m||1)*100).toFixed(1)}%) | <b>ሴት፡</b> ያለፈ ${fp}/${f} (${(fp/(f||1)*100).toFixed(1)}%)`;
    }

    function saveToSheets() {
        alert("መረጃው ወደ Google Sheets እንዲላክ አሁን መረጃውን በ Excel (CSV) ፋይል ዳውንሎድ እያደረግን ነው።");
        let csv = "ተ.ቁ,ስም,ጾታ,60%,40%,100%\n";
        document.querySelectorAll("#sList tr").forEach(row => {
            csv += `${row.cells[0].innerText},${row.cells[1].querySelector('input').value},${row.querySelector(".gn").value},${row.querySelector(".s60").innerText},${row.querySelector(".fn").value},${row.querySelector(".st").innerText}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'የተማሪዎች_ውጤት.csv';
        a.click();
    }
</script>
</body>
</html>
