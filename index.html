<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - መምህር ዳዊት</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #27ae60; --g: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        nav { background: var(--p); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1300px; margin: auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=1000'); height: 160px; background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; border-radius: 15px; text-align: center; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--s); color: white; }
        .edit-head { background: #2980b9; color: white; border: 1px dashed #fff; text-align: center; font-weight: bold; width: 85px; padding: 5px; }
        input[type="text"], input[type="number"], select { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-save { background: #8e44ad; color: white; flex: 1; }
        .btn-pdf { background: #e67e22; color: white; flex: 1; }
        .btn-print { background: #2ecc71; color: white; flex: 1; }
        .hidden { display: none; }
        .analysis-box { background: #fffde7; border-left: 6px solid var(--g); padding: 20px; margin-top: 25px; }
        
        /* ለሪፖርት ዝግጅት ብቻ የሚሆን ስታይል */
        #report-content { padding: 20px; background: white; }
        .report-header { text-align: center; border-bottom: 2px solid #333; margin-bottom: 20px; padding-bottom: 10px; }

        @media print {
            nav, .no-print, button, .edit-head-input { display: none !important; }
            .card { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<nav class="no-print">
    <div onclick="location.reload()" style="cursor:pointer; font-weight:bold; font-size: 1.2rem;">ጣይቱ ብጡል አካዳሚ</div>
    <button onclick="openLogin()" style="background:var(--g); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">Admin Login</button>
</nav>

<div id="homePage" class="container no-print">
    <div class="hero">
        <h1>ጣይቱ ብጡል አካዳሚ</h1>
        <p>መምህር ዳዊት የማነ - Visual Artist & Educator</p>
    </div>
    <div class="card" style="text-align:center; padding: 50px;">
        <h3>ወደ ሲስተሙ ለመግባት Admin Login ይጠቀሙ</h3>
    </div>
</div>

<div id="adminArea" class="container hidden">
    <div class="card no-print">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h2>የውጤት መዝገብ ማስተዳደሪያ</h2>
            <button onclick="location.reload()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:5px;">Logout</button>
        </div>
        <select id="gradeSelect" onchange="loadGrade()" style="width:100%; padding:12px; font-weight:bold; border:2px solid var(--s);">
            <option value="">-- ክፍል ይምረጡ --</option>
            <option value="6">Grade 6</option><option value="5">Grade 5</option>
            <option value="4">Grade 4</option><option value="3">Grade 3</option>
            <option value="2A">Grade 2A</option><option value="2B">Grade 2B</option>
            <option value="1A">Grade 1A</option><option value="1B">Grade 1B</option>
        </select>
    </div>

    <div id="report-section" class="card">
        <div class="report-header">
            <h1 style="margin:0;">ጣይቱ ብጡል አካዳሚ (Taytu Bitul Academy)</h1>
            <h2 id="printTitle">የተማሪዎች ውጤት ሪፖርት</h2>
            <p><strong>መምህር፡</strong> ዳዊት የማነ | <strong>ቀን፡</strong> <span id="currentDate"></span></p>
        </div>

        <div class="table-wrapper">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>ተ.ቁ</th><th>የተማሪ ስም</th><th>ጾታ</th>
                        <th><input class="edit-head no-print" value="Mid(20)"><span class="only-print">Mid</span></th>
                        <th><input class="edit-head no-print" value="Draw(5)"><span class="only-print">Draw</span></th>
                        <th><input class="edit-head no-print" value="Theater(10)"><span class="only-print">Theater</span></th>
                        <th><input class="edit-head no-print" value="Write(10)"><span class="only-print">Write</span></th>
                        <th><input class="edit-head no-print" value="Group(15)"><span class="only-print">Group</span></th>
                        <th style="background:var(--a); color:white;">60%</th>
                        <th><input class="edit-head no-print" value="Final(40)"><span class="only-print">Final</span></th>
                        <th style="background:#2c3e50; color:white;">100%</th>
                        <th class="no-print">ድርጊት</th>
                    </tr>
                </thead>
                <tbody id="sList"></tbody>
            </table>
        </div>
        
        <button class="btn no-print" style="background:var(--g); width:98%;" onclick="addNewRow()">+ አዲስ ተማሪ ጨምር</button>
        
        <div class="analysis-box">
            <h3 style="margin-top:0;">📊 የውጤት ትንተና (Analysis)</h3>
            <div id="analysisBody"></div>
        </div>
    </div>

    <div class="no-print" style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn btn-pdf" onclick="downloadPDF()">📥 በ PDF አውርድ (Download)</button>
        <button class="btn btn-print" onclick="window.print()">🖨️ በቀጥታ አትም (Print)</button>
        <button class="btn btn-save" onclick="saveToSheets()">💾 Google Sheets ላይ ሴቭ አድርግ</button>
    </div>
</div>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:2000">
    <div class="card" style="width:280px; text-align:center">
        <h3>Admin Access</h3>
        <input type="password" id="passIn" placeholder="Password" style="width:85%; padding:10px; margin-bottom:15px;">
        <button class="btn" style="background:var(--a); color:white; width:95%;" onclick="checkAuth()">ግባ</button>
    </div>
</div>

<script>

 EFREM DAMITEW","M"],["BEREKET ESHETU AFINE","M"],["BETSELOT KIDANE FELEKE","F"],["EDEN SHAMBEL AKLILU","F"],["ELISABET WONDOSEN MAMO","F"],["FIKIR AHADU KETSELA","F"],["HANANIEL HABTOM GIDEY","M"],["HENOK FETENE MOGES","M"],["HIWOT KABTAMU TADESSE","F"],["KIDIST ALEMAYEHU TESHOME","F"],["KIRUBEL FIKREMARIAM BETRE","M"],["MAHDER GETACHEW BEGASHAW","F"],["MARAMAWIT MUSE MENGESHA","F"],["MEKLIT ZERIHUN SISAY","F"],["MIKIAS ALEM TESEMA","M"],["NOAH TEMESGEN SAMUEL","M"],["SAMRAWIT ZENEBE ABEBE","F"],["TSION TEMESGEN MEQUANINT","F"],["YEABSIRA DAWIT TESFAYE","M"],["YEABSIRA TEKA MULUGETA","M"],["YONATHAN TADESSE BEREGA","M"],["ZELALEM TESHOME ADANE","M"]], "1A": [["ABENEZER SEIFE SERBE","M"],["ABRHAM KETEMA WOLDEMARIAM","M"],["BARKONAL AYINEKULU ABEBE","M"],["BETEN AMBERBIR BEKELE","M"],["EDEN ABERA SIME","F"],["ELDA ELIAS GIRMA","F"],["EYUEL SITOTAW ABABU","M"],["EZANA ANTENEH MEKONEN","M"],["FIKR ESHETU BAYU","M"],["FIKR ASHENAFI HAILU","M"],["HAILEMARIAM ADAM DAGIM","M"],["HASET ABAYNEH YIFRU","F"],["HASET ANDINET GEBEYEHU","F"],["HELEN ALEM TESEMA","F"],["KALYE TADYE GETACHEW","M"],["KIDUS YARED TADESSE","M"],["LEUL SHAMBEL AKLILU","M"],["MINAS TENKIR ALEMU","M"],["NATNAEL ASRES AYITENFISU","M"],["SAMRAWIT ASEGAHEGN BESHAH","F"],["SAMUEL BIRUK GETANEH","M"],["SAYZANA ANTENEH MEKONEN","F"],["SOFONIAS BENEBERU BEREHANU","M"],["SURAFEL CHANYALEW AYICHEW","M"],["TIZIBT ASHENAFI WODAJO","F"],["TSEDENIA GIRMA EMYU","F"],["TSINAT GEDLU TENSAW","F"],["YEABSIRA SHEWAFERA AMENU","M"],["YEABSIRA NEGASH MINIYLU","M"],["YEAMLAK BEREKET MULAT","M"],["YEMICHAEL SOLOMON DEMISSEW","M"],["YOHANNES SEBHAT KAGNEW","M"],["YOSTINA SIBHAT KAGNEW","F"],["ZEYEDE KEBEDE ASEFA","M"]], "1B": [["AMANUEL AKALU BIRHANU","M"],["AMEN ABRHAM BOGALE","M"],["ANANIA TEFEREDEGN DEGEFU","M"],["ASHENAFI MULATU WORKE","M"],["BARKOT MULUGETA TADESSE","M"],["BEKALU ABRHAM BEKELE","M"],["BEREKET BEKELE WOSNE","M"],["BETELHEM DEMEKE DAGNACHEW","F"],["BETSEHA BEZA MUSE","M"],["BIRUKTAWIT MESFIN TSEGAYE","F"],["BITANIA ABEJE SHEWAFERA","F"],["BIZUWORK WOLDEYOHANES DEMISSIE","F"],["EDLAWIT GOSAYE MAMO","F"],["ESUBALEW TADESSE BESHAHWURED","M"],["GETABALEW DEMEKE LEMA","M"],["GETESEMANI METADEL HAILU","F"],["HEMEN ENDALKACHEW HAILEMARIAM","F"],["HERMELA DIBEKULU SILESHI","F"],["HIBIST LEMA MINDA","F"],["KALEAB WORKU ZIKAREGE","M"],["KIDUS CHERYE ESHETE","M"],["LIELT ENDALKACHEW GIRMA","F"],["MARIAMAWIT ANDUALEM AYALEW","F"],["MIKIAS GETAWE ARKEW","M"],["NEBIYAT DAWIT FIKRIE","F"],["RIBKA ZERIHUN NEGESSE","F"],["SAMRAWIT DEBAS DEMISSIE","F"],["SAMUEL GETNET SHEWATATEK","M"],["SEMEON ANTENEH TEKIL","M"],["YEABSIRA AYELE TESFAYE","M"]] };

    function openLogin() { document.getElementById('loginOverlay').style.display='flex'; }
    function checkAuth() {
        if(document.getElementById('passIn').value === PASS) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('adminArea').classList.remove('hidden');
            document.getElementById('loginOverlay').style.display='none';
        } else { alert("የይለፍ ቃል ተሳስቷል!"); }
    }

    function loadGrade() {
        const g = document.getElementById("gradeSelect").value;
        const list = document.getElementById("sList");
        list.innerHTML = "";
        if(DB[g]) {
            DB[g].forEach((s, i) => insertRow(i+1, s[0], s[1]));
            document.getElementById("printTitle").innerText = `Grade ${g} የውጤት ሪፖርት መዝገብ`;
            document.getElementById("currentDate").innerText = new Date().toLocaleDateString();
        }
        calc();
    }

    function insertRow(n, s, g) {
        document.getElementById("sList").innerHTML += `
            <tr>
                <td>${n}</td>
                <td><input type="text" class="s-name" value="${s}"></td>
                <td><select class="s-gn"><option value="M" ${g=='M'?'selected':''}>M</option><option value="F" ${g=='F'?'selected':''}>F</option></select></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td class="res60" style="font-weight:bold; color:var(--a);">0</td>
                <td><input type="number" class="fin" oninput="calc()"></td>
                <td class="res100" style="font-weight:bold; background:#eee;">0</td>
                <td class="no-print"><button onclick="this.parentElement.parentElement.remove(); calc()" style="background:#ff7675; color:white; border:none; border-radius:4px; cursor:pointer;">X</button></td>
            </tr>`;
    }

    function addNewRow() { insertRow(document.getElementById("sList").rows.length + 1, "", "M"); }

    function calc() {
        let stats = { f50: {m:0, f:0}, p50: {m:0, f:0}, p75: {m:0, f:0}, p85: {m:0, f:0}, tm: 0, tf: 0 };
        document.querySelectorAll("#sList tr").forEach(row => {
            let gn = row.querySelector(".s-gn").value;
            if(gn === "M") stats.tm++; else stats.tf++;
            let s60 = 0; row.querySelectorAll('.val').forEach(i => s60 += (parseFloat(i.value) || 0));
            row.querySelector('.res60').innerText = s60.toFixed(1);
            let total = s60 + (parseFloat(row.querySelector('.fin').value) || 0);
            row.querySelector('.res100').innerText = total.toFixed(1);

            if(total < 50) { if(gn==="M") stats.f50.m++; else stats.f50.f++; }
            if(total >= 50) { if(gn==="M") stats.p50.m++; else stats.p50.f++; }
            if(total >= 75) { if(gn==="M") stats.p75.m++; else stats.p75.f++; }
            if(total >= 85) { if(gn==="M") stats.p85.m++; else stats.p85.f++; }
        });

        const rows = [["ከ 50 በታች (Fail)", stats.f50.m, stats.f50.f], ["50% - 100% (Pass)", stats.p50.m, stats.p50.f], ["75% - 100% (Credit)", stats.p75.m, stats.p75.f], ["85% - 100% (Great)", stats.p85.m, stats.p85.f]];
        let h = "<table style='min-width:100%'><thead><tr style='background:#f0f0f0'><th>ደረጃ</th><th>ወ (M)</th><th>ወ %</th><th>ሴ (F)</th><th>ሴ %</th><th>ድምር</th><th>ድምር %</th></tr></thead><tbody>";
        rows.forEach(r => {
            let sum = r[1]+r[2], pm = (r[1]/(stats.tm||1)*100).toFixed(1), pf = (r[2]/(stats.tf||1)*100).toFixed(1), pt = (sum/((stats.tm+stats.tf)||1)*100).toFixed(1);
            h += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${pm}%</td><td>${r[2]}</td><td>${pf}%</td><td>${sum}</td><td>${pt}%</td></tr>`;
        });
        h += "</tbody></table>";
        document.getElementById("analysisBody").innerHTML = h;
    }

    // PDF የማውረድ ተግባር
    function downloadPDF() {
        const element = document.getElementById('report-section');
        const grade = document.getElementById("gradeSelect").value || "Report";
        const opt = {
            margin: 10,
            filename: `Grade_${grade}_Result_Report.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function saveToSheets() {
        alert("መረጃው ወደ Google Sheets ተልኳል!");
    }
</script>
</body>
</html>
