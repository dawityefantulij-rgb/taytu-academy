<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taytu Academy - Home & Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --accent: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; }
        
        /* Navigation */
        nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; cursor: pointer; }

        /* Hero Section */
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); 
                height: 400px; background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        
        /* Home Sections */
        .section { padding: 40px 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; border-radius: 8px; height: 200px; object-fit: cover; }

        /* Login Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 350px; }
        input[type="password"] { width: 80%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }

        /* Management System Area */
        #managementArea { display: none; padding: 20px; }
        .mgmt-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: var(--secondary); color: white; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-logout { background: #e74c3c; }
        input[type="number"] { width: 50px; padding: 5px; }

        @media (max-width: 600px) { table { font-size: 11px; } th, td { padding: 5px; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">Taytu Academy</div>
    <div class="nav-links">
        <a onclick="showHome()">Home</a>
        <a onclick="openLogin()">Portal</a>

    </div>

        </div>
    </div>
</div>

<div id="loginOverlay">

</div>

<div id="managementArea" class="section">

                        <th>ስም</th>
                        <th>ጾታ</th>
                        <th>ሚድ (20)</th>
                        <th>ስዕል (5)</th>
                        <th>ቲያትር (10)</th>
                        <th>ድርሰት (10)</th>
                        <th>ቡድን (15)</th>
                        <th>ማጠቃለያ (40)</th>
                        <th>ጠቅላላ (100)</th>

            </table>
        </div>
        <br>
        <button class="btn" onclick="exportToExcel()">ወደ Excel አውርድ (Save)</button>
    </div>
</div>

    function showHome() { document.getElementById('homePage').style.display = 'block'; document.getElementById('managementArea').style.display = 'none'; }
    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

    function verifyAccess() {
        if (document.getElementById('passInput').value === authPass) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('managementArea').style.display = 'block';
            closeLogin();
        } else { alert("ያልተፈቀደ ሙከራ! ትክክለኛውን ፓስወርድ ያስገቡ።"); }
    }

    function loadStudents() {
        const grade = document.getElementById("gradeSelect").value;
        const tbody = document.getElementById("studentList");
        tbody.innerHTML = "";
        if (students[grade]) {
            students[grade].forEach((s, i) => {
                tbody.innerHTML += `<tr>
                    <td>${i+1}</td><td>${s[0]}</td><td>${s[1]}</td>
                    <td><input type="number" class="m" oninput="sum(this)"></td>
                    <td><input type="number" class="m" oninput="sum(this)"></td>
                    <td><input type="number" class="m" oninput="sum(this)"></td>
                    <td><input type="number" class="m" oninput="sum(this)"></td>
                    <td><input type="number" class="m" oninput="sum(this)"></td>
                    <td><input type="number" class="m" oninput="sum(this)"></td>
                    <td class="total">0</td>
                </tr>`;
            });
        }
    }

    function sum(el) {
        let row = el.parentElement.parentElement;
        let inputs = row.querySelectorAll('.m');
        let total = 0;
        inputs.forEach(i => total += (parseFloat(i.value) || 0));
        row.querySelector('.total').innerText = total.toFixed(1);
    }

    function exportToExcel() {
        let wb = XLSX.utils.table_to_book(document.getElementById("resultsTable"));
        XLSX.writeFile(wb, "Taytu_Academy_Results.xlsx");
    }

    function logout() { location.reload(); }
