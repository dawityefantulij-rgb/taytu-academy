<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taytu Academy - Teacher Dawit</title>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #27ae60; --g: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        nav { background: var(--p); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1200px; margin: auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* የቦክሶች ስፋት ማስተካከያ */
        input[type="text"] { width: 180px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input[type="number"] { width: 50px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--s); color: white; position: sticky; top: 0; }
        
        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #ddd; }
        
        .btn { background: var(--a); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-save { background: #8e44ad; margin-top: 15px; width: 100%; font-size: 16px; }
        .btn-add { background: var(--g); color: black; width: 100%; margin: 10px 0; font-size: 16px; }
        .hidden { display: none; }
        
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=1000'); height: 150px; background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <div onclick="location.reload()" style="cursor:pointer; font-weight:bold;">ጣይቱ ብጡል አካዳሚ</div>
    <button onclick="openLogin()" style="background:var(--g); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">Admin Login</button>
</nav>

<div id="homePage" class="container">
    <div class="hero">
        <h1>ጣይቱ ብጡል አካዳሚ</h1>
        <p>መምህር ዳዊት የማነ - የስነ-ጥበባት ትምህርት ክፍል</p>
    </div>
    <div class="card">
        <h3>🎨 የኪነ-ጥበብ ስራዎች ጋለሪ</h3>
        <div id="galleryDisplay" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
            <div style="height:120px; background:#eee; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#999;">ፎቶ አልተጫነም</div>
        </div>
    </div>
</div>

<div id="adminArea" class="container hidden">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:var(--p); margin:0;">የተማሪዎች ውጤት መመዝገቢያ</h2>
            <button onclick="location.reload()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ተ.ቁ</th>
                        <th style="min-width:200px;">የተማሪ ሙሉ ስም</th>
                        <th>ጾታ</th>
                        <th>20%</th><th>5%</th><th>10%</th><th>10%</th><th>15%</th>
                        <th>60%</th>
                        <th>40%</th>
                        <th>100%</th>
                        <th>እርምጃ</th>
                    </tr>
                </thead>
                <tbody id="studentBody">
                    </tbody>
            </table>
        </div>

        <button class="btn btn-add" onclick="addNewRow()">+ አዲስ ተማሪ ጨምር</button>
        
        <button class="btn btn-save" onclick="saveToGoogleSheets()">💾 መረጃውን በቋሚነት አስቀምጥ (Save to Sheets)</button>
    </div>

    <div class="card" style="background:#fffde7; border-left: 5px solid var(--g);">
        <h3>📊 የውጤት ትንተና</h3>
        <div id="analysisDiv">መረጃ አልተሞላም...</div>
    </div>
</div>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:2000;">
    <div class="card" style="width:320px; text-align:center;">
        <h3 style="margin-top:0;">Admin Login</h3>
        <input type="password" id="passIn" placeholder="Password" style="width:90%; margin-bottom:15px;">
        <button class="btn" style="width:100%;" onclick="checkAuth()">ግባ</button>
        <p onclick="document.getElementById('loginOverlay').style.display='none'" style="color:red; cursor:pointer; margin-top:15px;">ዝጋ</p>
    </div>
</div>

<script>
    const KEY = "Dawit@0721";

    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function checkAuth() {
        if(document.getElementById('passIn').value === KEY) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('adminArea').classList.remove('hidden');
            document.getElementById('loginOverlay').style.display = 'none';
        } else { alert("የይለፍ ቃል ተሳስቷል!"); }
    }

    function addNewRow() {
        const body = document.getElementById("studentBody");
        const count = body.rows.length + 1;
        const row = body.insertRow();
        row.innerHTML = `
            <td>${count}</td>
            <td><input type="text" placeholder="ሙሉ ስም"></td>
            <td><select class="gen"><option>M</option><option>F</option></select></td>
            <td><input type="number" class="sc" oninput="calc()"></td>
            <td><input type="number" class="sc" oninput="calc()"></td>
            <td><input type="number" class="sc" oninput="calc()"></td>
            <td><input type="number" class="sc" oninput="calc()"></td>
            <td><input type="number" class="sc" oninput="calc()"></td>
            <td class="s60" style="font-weight:bold;">0</td>
            <td><input type="number" class="fn" oninput="calc()"></td>
            <td class="st" style="font-weight:bold; color:blue;">0</td>
            <td><button onclick="this.parentElement.parentElement.remove(); calc()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:4px;">X</button></td>
        `;
    }

    function calc() {
        let m=0, mp=0, f=0, fp=0;
        document.querySelectorAll("#studentBody tr").forEach(row => {
            let gender = row.querySelector(".gen").value;
            let sum60 = 0;
            row.querySelectorAll(".sc").forEach(i => sum60 += (parseFloat(i.value) || 0));
            row.querySelector(".s60").innerText = sum60.toFixed(1);
            
            let total = sum60 + (parseFloat(row.querySelector(".fn").value) || 0);
            row.querySelector(".st").innerText = total.toFixed(1);

            if(gender === "M") { m++; if(total >= 50) mp++; }
            else { f++; if(total >= 50) fp++; }
        });
        document.getElementById("analysisDiv").innerHTML = `<b>ወንድ፡</b> ያለፈ ${mp} / ጠቅላላ ${m} | <b>ሴት፡</b> ያለፈ ${fp} / ጠቅላላ ${f}`;
    }

    function saveToGoogleSheets() {
        alert("መረጃው ወደ Google Sheets እንዲላክ አሁን መረጃውን በ Excel ፋይል ዳውንሎድ እያደረግን ነው። በቀጣይ ደረጃ Google Sheetsን እናገናኛለን።");
        let csv = "ተ.ቁ,ስም,ጾታ,60%,40%,100%\n";
        document.querySelectorAll("#studentBody tr").forEach(row => {
            const n = row.cells[1].querySelector('input').value;
            const g = row.querySelector(".gen").value;
            const t = row.querySelector(".st").innerText;
            csv += `${row.cells[0].innerText},${n},${g},${row.querySelector(".s60").innerText},${row.querySelector(".fn").value},${t}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'የተማሪዎች_ውጤት.csv';
        a.click();
    }
</script>
</body>
</html>
