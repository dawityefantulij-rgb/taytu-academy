<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - መ/ር ዳዊት የማነ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1e3c72; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        nav { background: var(--primary); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .container { width: 95%; max-width: 1200px; margin: 20px auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        
        /* የሰንጠረዥ ማስተካከያ - ጠበብ እንዲል */
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        th, td { border: 1px solid #444; padding: 6px 2px; text-align: center; overflow: hidden; }
        th { background: #eee; }
        
        /* Column Widths */
        .col-no { width: 30px; }
        .col-name { width: 180px; text-align: left; padding-left: 5px; }
        .col-gen { width: 35px; }
        .col-mark { width: 45px; } /* ውጤቶች ጠበብ እንዲሉ */
        .col-total { width: 50px; font-weight: bold; background: #f9f9f9; }

        input[type="number"], input[type="text"], select { 
            width: 95%; border: none; background: transparent; text-align: center; font-size: 12px;
        }
        .s-name { text-align: left !important; }

        .watermark {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 4rem; color: rgba(0, 0, 0, 0.05); font-weight: bold; pointer-events: none; display: none;
        }

        /* ገጽ ለመቁረጥ (Page Break) */
        .page-break { page-break-after: always; margin-bottom: 30px; border-bottom: 2px dashed #ccc; padding-bottom: 20px; }
        .analysis-page { page-break-before: always; margin-top: 50px; }

        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .hidden { display: none !important; }

        @media print {
            .no-print, .btn-row-del { display: none !important; }
            body { background: white; padding: 0; }
            .container { width: 100%; margin: 0; }
            .card { box-shadow: none; border: none; padding: 10px; }
            .watermark { display: block !important; }
            .page-break { border: none; }
            nav { display: none; }
        }
    </style>
</head>
<body onload="initApp()">

<nav class="no-print">
    <div style="font-weight:bold; font-size:1.2rem;">🎨 ጣይቱ ብጡል አካዳሚ</div>
    <div>
        <button class="btn btn-blue" onclick="showSection('homePage')"><i class="fas fa-home"></i> መነሻ</button>
        <button class="btn btn-blue" onclick="showLogin()"><i class="fas fa-lock"></i> Admin</button>
    </div>
</nav>

<div id="homePage" class="container">
    <div class="card" style="text-align:center;">
        <h1>መ/ር ዳዊት የማነ</h1>
        <p>የስነ-ጥበብ (Art) እና ሙዚቃ (Music) ትምህርት ክፍል</p>
    </div>
    <div id="publicGallery" class="container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:10px;"></div>
</div>

<div id="adminArea" class="container hidden">
    <div class="card no-print">
        <select id="gradeSelector" onchange="changeGrade(this.value)" style="padding:10px; width:200px;">
            <option value="">-- ክፍል ይምረጡ --</option>
            <option value="1A">Grade 1A</option><option value="1B">Grade 1B</option>
            <option value="2A">Grade 2A</option><option value="2B">Grade 2B</option>
            <option value="3">Grade 3</option><option value="4">Grade 4</option>
            <option value="5">Grade 5</option><option value="6">Grade 6</option>
        </select>
        <button class="btn btn-blue" onclick="addNewRow()">+ ተማሪ ጨምር</button>
    </div>

    <div id="printableArea">
        <div id="tablesContainer"></div> <div id="analysisSection" class="card analysis-page">
            <div class="watermark">Approved by ART&MUSIC DPT</div>
            <h3 style="text-align:center; color:var(--primary);">📈 የውጤት ትንተና (Analysis)</h3>
            <table style="width:100%; table-layout: auto;">
                <thead>
                    <tr><th>የውጤት ክልል</th><th>ወንድ</th><th>ወንድ %</th><th>ሴት</th><th>ሴት %</th><th>ድምር</th></tr>
                </thead>
                <tbody id="analysisBody"></tbody>
            </table>
            <div style="margin-top:50px; display:flex; justify-content:space-around; font-weight:bold;">
                <div>Prepared by: _________</div>
                <div>Dept Head: _________</div>
                <div>Director: _________</div>
            </div>
        </div>
    </div>

    <div class="card no-print" style="text-align:center;">
        <button class="btn btn-green" onclick="saveToSheets()"><i class="fas fa-save"></i> Save Data</button>
        <button class="btn btn-blue" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Download PDF</button>
        <button class="btn" style="background:#444; color:white;" onclick="window.print()"><i class="fas fa-print"></i> Print Report</button>
    </div>
</div>

<div id="loginOverlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:9999;">
    <div class="card" style="width:300px; text-align:center;">
        <h3>Admin Login</h3>
        <input type="password" id="passInput" placeholder="Password" style="width:80%; padding:10px; margin-bottom:10px;">
        <button class="btn btn-blue" style="width:90%" onclick="checkAuth()">ግባ</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxDi0AAWFOl5K-0doGSmwcb4C87SZXBWrso_3P_5qY/exec';
    let currentGrade = "";

    function showSection(id) {
        document.getElementById('homePage').classList.toggle('hidden', id !== 'homePage');
        document.getElementById('adminArea').classList.toggle('hidden', id !== 'adminArea');
    }
    function showLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); }
    function closeLogin() { document.getElementById('loginOverlay').classList.add('hidden'); }
    function checkAuth() {
        if(document.getElementById('passInput').value === "Dawit@0721") { closeLogin(); showSection('adminArea'); }
        else alert("Wrong Password!");
    }

    // ዳታውን በየ 10 ተማሪ ከፍሎ ሰንጠረዥ የሚሰራ ፈንክሽን
    function renderTables(students) {
        const container = document.getElementById('tablesContainer');
        container.innerHTML = "";
        const chunkSize = 10;
        
        for (let i = 0; i < students.length; i += chunkSize) {
            const chunk = students.slice(i, i + chunkSize);
            const isLast = (i + chunkSize) >= students.length;
            
            let tableHTML = `
                <div class="card ${!isLast ? 'page-break' : ''}">
                    <div class="watermark">Approved by ART&MUSIC DPT</div>
                    <h2 style="text-align:center; font-size:16px;">ጣይቱ ብጡል አካዳሚ - የውጤት መዝገብ (${currentGrade})</h2>
                    <table>
                        <thead>
                            <tr>
                                <th class="col-no">ተ.ቁ</th>
                                <th class="col-name">የተማሪ ስም</th>
                                <th class="col-gen">ጾታ</th>
                                <th class="col-mark">Mid</th><th class="col-mark">Draw</th>
                                <th class="col-mark">Mus</th><th class="col-mark">Writ</th>
                                <th class="col-mark">Grp</th><th class="col-mark">60%</th>
                                <th class="col-mark">Fin</th><th class="col-total">100%</th>
                                <th class="col-gen no-print">X</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            chunk.forEach((s, index) => {
                const globalIndex = i + index;
                tableHTML += `
                    <tr>
                        <td>${globalIndex + 1}</td>
                        <td><input type="text" class="s-name" value="${s.name}" oninput="updateData(${globalIndex}, 'name', this.value)"></td>
                        <td><select onchange="updateData(${globalIndex}, 'gen', this.value)"><option value="M" ${s.gen=='M'?'selected':''}>M</option><option value="F" ${s.gen=='F'?'selected':''}>F</option></select></td>
                        <td><input type="number" value="${s.v1}" oninput="updateScore(${globalIndex}, 'v1', this.value)"></td>
                        <td><input type="number" value="${s.v2}" oninput="updateScore(${globalIndex}, 'v2', this.value)"></td>
                        <td><input type="number" value="${s.v3}" oninput="updateScore(${globalIndex}, 'v3', this.value)"></td>
                        <td><input type="number" value="${s.v4}" oninput="updateScore(${globalIndex}, 'v4', this.value)"></td>
                        <td><input type="number" value="${s.v5}" oninput="updateScore(${globalIndex}, 'v5', this.value)"></td>
                        <td style="background:#f0f0f0">${s.r60}</td>
                        <td><input type="number" value="${s.f}" oninput="updateScore(${globalIndex}, 'f', this.value)"></td>
                        <td style="font-weight:bold; background:#eef">${s.r100}</td>
                        <td class="no-print"><button onclick="deleteRow(${globalIndex})" style="color:red; cursor:pointer; border:none; background:none;">✖</button></td>
                    </tr>`;
            });

            tableHTML += `</tbody></table></div>`;
            container.insertAdjacentHTML('beforeend', tableHTML);
        }
    }

    function changeGrade(g) {
        if(!g) return;
        currentGrade = g;
        let data = JSON.parse(localStorage.getItem('data_' + g) || "[]");
        if(data.length === 0) {
            // Default list if empty
            data = [ {name: "Student 1", gen:"M", v1:0, v2:0, v3:0, v4:0, v5:0, r60:0, f:0, r100:0} ];
        }
        renderTables(data);
        updateAnalysis();
    }

    function updateScore(idx, field, val) {
        let data = JSON.parse(localStorage.getItem('data_' + currentGrade));
        data[idx][field] = parseFloat(val) || 0;
        let s = data[idx];
        s.r60 = (s.v1 + s.v2 + s.v3 + s.v4 + s.v5).toFixed(1);
        s.r100 = (parseFloat(s.r60) + s.f).toFixed(1);
        localStorage.setItem('data_' + currentGrade, JSON.stringify(data));
        renderTables(data);
        updateAnalysis();
    }

    function updateData(idx, field, val) {
        let data = JSON.parse(localStorage.getItem('data_' + currentGrade));
        data[idx][field] = val;
        localStorage.setItem('data_' + currentGrade, JSON.stringify(data));
        if(field === 'gen') updateAnalysis();
    }

    function deleteRow(idx) {
        let data = JSON.parse(localStorage.getItem('data_' + currentGrade));
        data.splice(idx, 1);
        localStorage.setItem('data_' + currentGrade, JSON.stringify(data));
        renderTables(data);
        updateAnalysis();
    }

    function addNewRow() {
        if(!currentGrade) return alert("መጀመሪያ ክፍል ይምረጡ!");
        let data = JSON.parse(localStorage.getItem('data_' + currentGrade) || "[]");
        data.push({name: "", gen:"M", v1:0, v2:0, v3:0, v4:0, v5:0, r60:0, f:0, r100:0});
        localStorage.setItem('data_' + currentGrade, JSON.stringify(data));
        renderTables(data);
    }

    function updateAnalysis() {
        let data = JSON.parse(localStorage.getItem('data_' + currentGrade) || "[]");
        let stats = { "Below 50": {m:0, f:0}, "50-100": {m:0, f:0}, "75-100": {m:0, f:0}, "85-100": {m:0, f:0} };
        let mTot = 0, fTot = 0;
        data.forEach(s => {
            let v = parseFloat(s.r100);
            if(s.gen === 'M') mTot++; else fTot++;
            if(v < 50) stats["Below 50"][s.gen.toLowerCase()]++;
            if(v >= 50) stats["50-100"][s.gen.toLowerCase()]++;
            if(v >= 75) stats["75-100"][s.gen.toLowerCase()]++;
            if(v >= 85) stats["85-100"][s.gen.toLowerCase()]++;
        });
        const ab = document.getElementById('analysisBody');
        ab.innerHTML = Object.keys(stats).map(k => `
            <tr>
                <td>${k}</td><td>${stats[k].m}</td><td>${mTot?((stats[k].m/mTot)*100).toFixed(1):0}%</td>
                <td>${stats[k].f}</td><td>${fTot?((stats[k].f/fTot)*100).toFixed(1):0}%</td>
                <td>${stats[k].m + stats[k].f}</td>
            </tr>`).join('');
    }

    function downloadPDF() {
        const element = document.getElementById('printableArea');
        const opt = {
            margin: 0.3, filename: currentGrade + '_Report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    async function saveToSheets() {
        let data = JSON.parse(localStorage.getItem('data_' + currentGrade));
        try {
            await fetch(scriptURL, { method:'POST', mode:'no-cors', body:JSON.stringify({students:data, grade:currentGrade}) });
            alert("Saved to Google Sheets!");
        } catch(e) { alert("Error saving!"); }
    }

    function initApp() { /* Gallery and other initializations */ }
</script>
</body>
</html>
