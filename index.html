    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #27ae60; --g: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        nav { background: var(--p); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=1000'); height: 200px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; border-radius: 15px; text-align: center; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--s); color: white; font-weight: 600; font-size: 13px; }
        .editable-head { background: #2980b9; color: white; border: none; text-align: center; font-weight: bold; width: 90px; }

        input[type="number"] { width: 55px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--a); color: white; }
        .btn-save { background: #8e44ad; color: white; width: 100%; font-size: 16px; margin-top: 15px; }
        .hidden { display: none; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-grid img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    function openLogin() { document.getElementById('loginOverlay').style.display='flex'; }
    function checkAuth() {
        if(document.getElementById('passIn').value === PASS) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('adminArea').classList.remove('hidden');
            document.getElementById('loginOverlay').style.display='none';
        } else { alert("የይለፍ ቃል ተሳስቷል!"); }
    }

    function loadGrade() {
        const g = document.getElementById("gradeSelect").value;
        const list = document.getElementById("sList");
        list.innerHTML = "";
        if(DB[g]) DB[g].forEach((s, i) => insertRow(i+1, s[0], s[1]));
        calc();
    }

    function insertRow(n, s, g) {
        document.getElementById("sList").innerHTML += `
            <tr>
                <td>${n}</td>
                <td><input type="text" class="s-name" value="${s}"></td>
                <td><select class="s-gn"><option value="M" ${g=='M'?'selected':''}>M</option><option value="F" ${g=='F'?'selected':''}>F</option></select></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td class="res60">0</td>
                <td><input type="number" class="fin" oninput="calc()"></td>
                <td class="res100">0</td>
                <td><button onclick="this.parentElement.parentElement.remove(); calc()">X</button></td>
            </tr>`;
    }

    function calc() {
        document.querySelectorAll("#sList tr").forEach(row => {
            let s60 = 0; row.querySelectorAll('.val').forEach(i => s60 += (parseFloat(i.value) || 0));
            row.querySelector('.res60').innerText = s60.toFixed(1);
            let total = s60 + (parseFloat(row.querySelector('.fin').value) || 0);
            row.querySelector('.res100').innerText = total.toFixed(1);
        });
    }

    function saveToSheets() {
        const scriptURL = "https://script.google.com/macros/s/AKfycbyBbXJ1OYKBiRBHu0xRW3ysyZDPP3tqr5iUD7L6PL-AuIZpve1ntcNe9-WjNDCd3wUN/exec";
        let allData = [];
        document.querySelectorAll("#sList tr").forEach(row => {
            allData.push([new Date().toLocaleDateString(), document.getElementById("gradeSelect").value, row.cells[0].innerText, row.querySelector('.s-name').value, row.querySelector('.s-gn').value, row.querySelector('.res60').innerText, row.querySelector('.fin').value, row.querySelector('.res100').innerText]);
        });
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(allData) }).then(() => alert("በስኬት ተቀምጧል!"));
    }
