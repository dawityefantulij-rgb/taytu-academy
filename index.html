<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - መ/ር ዳዊት የማነ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary: #1e3c72; 
            --secondary: #2a5298; 
            --accent: #ff9a9e;
            --success: #00b09b;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
            color: #333; 
        }

        nav { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container { width: 95%; max-width: 1200px; margin: 20px auto; padding: 20px; }
        
        .card { 
            background: var(--glass);
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ሰንጠረዡ ጠበብ ብሎ በአንድ ገጽ እንዲታይ */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            background: white;
            font-size: 11px; /* ጽሑፉ ጠበብ እንዲል */
            table-layout: fixed; /* ዓምዶቹ እንዳይሰፉ */
        }
        
        th, td { 
            border: 1px solid #444; 
            padding: 4px 2px; 
            text-align: center; 
            overflow: hidden;
        }

        th { background-color: #f2f2f2; font-weight: bold; }

        /* የአምዶች ስፋት ማስተካከያ */
        .col-no { width: 25px; }
        .col-name { width: 160px; text-align: left; padding-left: 5px; }
        .col-sex { width: 30px; }
        .col-mark { width: 38px; }
        .col-total { width: 45px; font-weight: bold; background: #f9f9f9; }

        input[type="number"], input[type="text"] {
            width: 95%;
            padding: 3px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
        }

        /* Page Break ማስተካከያ - በየ 10 ተማሪው እንዲቆርጥ */
        .page-break { page-break-after: always; }
        .analysis-page { page-break-before: always; margin-top: 40px; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .hidden { display: none; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .card { box-shadow: none; border: none; padding: 0; }
            .page-break { display: block; page-break-after: always; }
        }
    </style>
</head>
<body onload="initApp()">

<nav class="no-print">
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:40px; height:40px; background:var(--primary); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">DY</div>
        <span style="font-weight:bold; color:var(--primary);">ጣይቱ ብጡል አካዳሚ</span>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" onclick="showSection('homePage')">መነሻ</button>
        <button class="btn btn-primary" onclick="showLogin()">Admin</button>
    </div>
</nav>

<div id="homePage" class="container">
    <div class="card" style="text-align:center; color:var(--primary);">
        <h1>መ/ር ዳዊት የማነ</h1>
        <p>የስነ-ጥበብ (Art) እና ሙዚቃ (Music) ትምህርት ክፍል</p>
    </div>
</div>

<div id="adminArea" class="container hidden">
    <div class="card no-print">
        <select id="gradeSelector" onchange="changeGrade(this.value)" style="padding:10px; border-radius:10px; width:200px;">
            <option value="">-- ክፍል ይምረጡ --</option>
            <option value="1A">Grade 1A</option><option value="1B">Grade 1B</option>
            <option value="2A">Grade 2A</option><option value="2B">Grade 2B</option>
            <option value="3">Grade 3</option><option value="4">Grade 4</option>
            <option value="5">Grade 5</option><option value="6">Grade 6</option>
        </select>
        <button class="btn btn-primary" onclick="addNewRow()">+ ተማሪ ጨምር</button>
    </div>

    <div id="printableArea">
        <div id="tablesContainer"></div>

        <div id="analysisSection" class="card analysis-page">
            <h3 style="text-align:center;">📉 የውጤት ትንተና (Analysis)</h3>
            <table style="table-layout: auto;">
                <thead>
                    <tr><th>ክልል</th><th>ወንድ</th><th>ወንድ %</th><th>ሴት</th><th>ሴት %</th><th>ድምር</th></tr>
                </thead>
                <tbody id="analysisBody"></tbody>
            </table>
            <div style="margin-top:50px; display:flex; justify-content:space-around; font-weight:bold; font-size:12px;">
                <div>የክፍሉ መምህር: _________</div>
                <div>የክፍል ኃላፊ: _________</div>
                <div>ርዕሰ መምህር: _________</div>
            </div>
        </div>
    </div>

    <div class="card no-print" style="text-align:center; display:flex; justify-content:center; gap:10px;">
        <button class="btn btn-success" onclick="saveData()">Save</button>
        <button class="btn btn-primary" onclick="window.print()">Print / PDF</button>
        <button class="btn btn-primary" style="background:#444;" onclick="location.reload()">Logout</button>
    </div>
</div>

<div id="loginOverlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:2000;">
    <div class="card" style="width:300px; text-align:center;">
        <h3>Admin Login</h3>
        <input type="password" id="passInput" placeholder="Password" style="width:90%; padding:10px; margin-bottom:15px; border-radius:10px;">
        <button class="btn btn-primary" style="width:100%" onclick="checkAuth()">ግባ</button>
    </div>
</div>

<script>
    let currentGrade = "";
    let students = [];

    function initApp() { /* Initialize gallery etc */ }

    function showSection(id) {
        document.getElementById('homePage').classList.toggle('hidden', id !== 'homePage');
        document.getElementById('adminArea').classList.toggle('hidden', id !== 'adminArea');
    }

    function showLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); }

    function checkAuth() {
        if(document.getElementById('passInput').value === "Dawit@0721") {
            document.getElementById('loginOverlay').classList.add('hidden');
            showSection('adminArea');
        } else alert("ስህተት!");
    }

    function changeGrade(g) {
        if(!g) return;
        currentGrade = g;
        students = JSON.parse(localStorage.getItem('data_' + g) || "[]");
        renderTables();
    }

    function renderTables() {
        const container = document.getElementById('tablesContainer');
        container.innerHTML = "";
        
        // በየ 10 ተማሪው ገጽ እንዲከፍል
        for (let i = 0; i < students.length; i += 10) {
            const chunk = students.slice(i, i + 10);
            let html = `<div class="card ${i + 10 < students.length ? 'page-break' : ''}">
                <h3 style="text-align:center; font-size:14px;">የተማሪዎች ውጤት መዝገብ - Grade ${currentGrade} (ገጽ ${Math.floor(i/10)+1})</h3>
                <table>
                    <thead>
                        <tr>
                            <th class="col-no">#</th><th class="col-name">የተማሪ ስም</th><th class="col-sex">ጾታ</th>
                            <th class="col-mark">Mid</th><th class="col-mark">Drw</th><th class="col-mark">Mus</th>
                            <th class="col-mark">Wrt</th><th class="col-mark">Fin</th><th class="col-total">100%</th>
                            <th class="no-print" style="width:30px;">X</th>
                        </tr>
                    </thead>
                    <tbody>`;
            
            chunk.forEach((s, idx) => {
                const gIdx = i + idx;
                html += `<tr>
                    <td>${gIdx + 1}</td>
                    <td><input type="text" value="${s.name || ''}" oninput="updateVal(${gIdx}, 'name', this.value)"></td>
                    <td><input type="text" value="${s.gen || 'M'}" oninput="updateVal(${gIdx}, 'gen', this.value)"></td>
                    <td><input type="number" value="${s.v1 || 0}" oninput="updateScore(${gIdx}, 'v1', this.value)"></td>
                    <td><input type="number" value="${s.v2 || 0}" oninput="updateScore(${gIdx}, 'v2', this.value)"></td>
                    <td><input type="number" value="${s.v3 || 0}" oninput="updateScore(${gIdx}, 'v3', this.value)"></td>
                    <td><input type="number" value="${s.v4 || 0}" oninput="updateScore(${gIdx}, 'v4', this.value)"></td>
                    <td><input type="number" value="${s.f || 0}" oninput="updateScore(${gIdx}, 'f', this.value)"></td>
                    <td class="col-total">${s.total || 0}</td>
                    <td class="no-print"><button onclick="delRow(${gIdx})" style="color:red; background:none; border:none; cursor:pointer;">✖</button></td>
                </tr>`;
            });
            
            html += `</tbody></table></div>`;
            container.insertAdjacentHTML('beforeend', html);
        }
        updateAnalysis();
    }

    function updateVal(idx, f, v) { students[idx][f] = v; }
    function updateScore(idx, f, v) {
        students[idx][f] = parseFloat(v) || 0;
        let s = students[idx];
        s.total = ((s.v1 || 0) + (s.v2 || 0) + (s.v3 || 0) + (s.v4 || 0) + (s.f || 0)).toFixed(1);
        renderTables();
    }

    function addNewRow() {
        if(!currentGrade) return alert("ክፍል ይምረጡ!");
        students.push({name: "", gen: "M", v1:0, v2:0, v3:0, v4:0, f:0, total:0});
        renderTables();
    }

    function delRow(idx) { if(confirm("ይጥፋ?")) { students.splice(idx, 1); renderTables(); } }
    function saveData() { localStorage.setItem('data_' + currentGrade, JSON.stringify(students)); alert("Saved!"); }

    function updateAnalysis() {
        let stats = { "Below 50": {m:0, f:0}, "50-100": {m:0, f:0} };
        let mTot = 0, fTot = 0;
        students.forEach(s => {
            let v = parseFloat(s.total) || 0;
            if(s.gen === 'M') mTot++; else fTot++;
            if(v < 50) stats["Below 50"][s.gen === 'M' ? 'm' : 'f']++;
            else stats["50-100"][s.gen === 'M' ? 'm' : 'f']++;
        });
        document.getElementById('analysisBody').innerHTML = Object.keys(stats).map(k => 
            `<tr><td>${k}</td><td>${stats[k].m}</td><td>${mTot?((stats[k].m/mTot)*100).toFixed(1):0}%</td><td>${stats[k].f}</td><td>${fTot?((stats[k].f/fTot)*100).toFixed(1):0}%</td><td>${stats[k].m+stats[k].f}</td></tr>`
        ).join('');
    }
</script>
</body>
</html>
