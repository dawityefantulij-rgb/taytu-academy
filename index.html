<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የጣይቱ ብጡል አካዳሚ - መምህር ዳዊት</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #2c3e50; color: white; position: sticky; top: 0; z-index: 1000; }
        .teacher-name { font-family: 'Great Vibes', cursive; font-size: 28px; color: #e67e22; }
        .admin-btn { background: #e67e22; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; cursor: pointer; font-weight: bold; }
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; color: white; padding: 60px 20px; text-align: center; }
        .container { padding: 30px 5%; max-width: 1200px; margin: auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .art-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .art-card img { width: 100%; height: 230px; object-fit: cover; display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { padding: 12px; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; }
        .save-btn { background: #27ae60; color: white; }
        .upload-btn { background: #8e44ad; color: white; }
        .excel-btn { background: #3498db; color: white; margin-top: 10px; }
        #admin-panel { display: none; background: #ecf0f1; padding: 25px; border-radius: 15px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #2c3e50; color: white; }
        .del-btn { background: #e74c3c; color: white; width: auto; padding: 5px 12px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">🎨 <span class="teacher-name">Teacher Dawit Yemane</span></div>
        <a class="admin-btn" onclick="login()">Admin Login</a>
    </nav>

    <header class="hero">
        <h1>የጣይቱ ብጡል አካዳሚ</h1>
        <p>የተማሪዎች ስራዎች እና ውጤት መቆጣጠሪያ ማዕከል</p>
    </header>

    <div class="container">
        <h2 style="text-align:center; border-bottom: 3px solid #e67e22; display:block; padding-bottom:10px;">የተማሪዎች የፈጠራ ውጤቶች (Gallery)</h2>
        <div class="gallery-grid" id="artGallery"></div>

        <div class="card">
            <h3 style="text-align:center;">ለወላጆች መረጃ መጠየቂያ</h3>
            <input type="text" id="parentName" placeholder="የእርስዎ ስም">
            <input type="text" id="studentNameField" placeholder="የተማሪ ስም">
            <textarea id="parentMessage" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
            <button onclick="sendToTelegram()" style="background: #0088cc; color: white;">በቴሌግራም ላክ</button>
        </div>

        <div id="admin-panel">
            <h2 style="text-align:center;">የመምህር ዳዊት Dashboard</h2>
            <div class="card">
                <h3>📊 ውጤት መመዝገቢያ</h3>
                <input type="text" id="stdName" placeholder="የተማሪ ስም">
                <input type="number" id="stdScore" placeholder="ውጤት (ከ 100)">
                <select id="stdBehavior">
                    <option value="በጣም ጥሩ">በጣም ጥሩ</option>
                    <option value="ጥሩ">ጥሩ</option>
                    <option value="መካከለኛ">መካከለኛ</option>
                </select>
                <button onclick="saveStudent()" class="save-btn">መዝግብ</button>
                <button onclick="exportToExcel()" class="excel-btn">ወደ Excel አውርድ</button>
            </div>

            <div class="card">
                <h3>🖼️ ፎቶ መጫኛ</h3>
                <input type="text" id="artTitle" placeholder="የርዕስ ስም">
                <input type="text" id="artStudent" placeholder="የተማሪ ስም">
                <input type="file" id="imageUpload" accept="image/*">
                <button onclick="processAndUpload()" class="upload-btn">ወደ ጋለሪ ጨምር</button>
            </div>

            <div class="card" style="overflow-x:auto;">
                <h3>የተማሪዎች ውጤት ዝርዝር</h3>
                <table>
                    <thead>
                        <tr><th>ስም</th><th>ውጤት</th><th>ዝቅተኛ</th><th>ሁኔታ</th><th>ፀባይ</th><th>እርምጃ</th></tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => { showStudents(); displayGallery(); });

        function login() {
            // አዲሱ ፓስወርድ
            if(prompt("ሚስጥራዊ ቃል ያስገቡ:") === "Dawit0721") {
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("የተሳሳተ ፓስወርድ ነው!"); }
        }

        // ቴሌግራም የመላኪያ ፈንክሽን
        function sendToTelegram() {
            const pName = document.getElementById('parentName').value;
            const sName = document.getElementById('studentNameField').value;
            const msg = document.getElementById('parentMessage').value;
            
            if(!pName || !msg) return alert("እባክዎ ስምዎን እና መልእክትዎን ይሙሉ!");

            const telegramUser = "DawitYefantuLij23"; 
            const fullText = `ሰላም መምህር ዳዊት%0Aከወላጅ፡ ${pName}%0Aስለ ተማሪ፡ ${sName}%0Aጥያቄ፡ ${msg}`;
            
            window.open(`https://t.me/${telegramUser}?text=${fullText}`, '_blank');
        }

        function processAndUpload() {
            const title = document.getElementById('artTitle').value;
            const student = document.getElementById('artStudent').value;
            const file = document.getElementById('imageUpload').files[0];
            if(!title || !student || !file) return alert("እባክዎ መረጃዎችን ይሙሉ!");
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                    let gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
                    gallery.push({title, student, image: compressedData});
                    localStorage.setItem('gallery', JSON.stringify(gallery));
                    displayGallery();
                    alert("ፎቶው በተሳካ ሁኔታ ተጭኗል!");
                }
            }
        }

        function displayGallery() {
            const gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
            const grid = document.getElementById('artGallery');
            grid.innerHTML = gallery.map(item => `
                <div class="art-card">
                    <img src="${item.image}" alt="Art">
                    <div style="padding:10px; text-align:center;">
                        <h4 style="margin:5px 0;">${item.title}</h4>
                        <p style="font-size:13px; color:gray; margin:0;">በ${item.student}</p>
                    </div>
                </div>
            `).join('');
        }

        function saveStudent() {
            const name = document.getElementById('stdName').value;
            const score = document.getElementById('stdScore').value;
            const behavior = document.getElementById('stdBehavior').value;
            if(!name || !score) return alert("መረጃ ይሙሉ!");
            let students = JSON.parse(localStorage.getItem('students') || '[]');
            students.push({name, score, behavior});
            localStorage.setItem('students', JSON.stringify(students));
            showStudents();
            document.getElementById('stdName').value = '';
            document.getElementById('stdScore').value = '';
        }

        function showStudents() {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = students.map((s, i) => {
                let isLow = s.score < 50;
                return `<tr><td>${s.name}</td><td>${s.score}%</td><td>${isLow?'አዎ':'አይደለም'}</td><td>${isLow?'ድጋፍ ይፈልጋል':'ጥሩ'}</td><td>${s.behavior}</td><td><button class="del-btn" onclick="deleteStudent(${i})">አጥፋ</button></td></tr>`;
            }).join('');
        }

        function deleteStudent(i) {
            let students = JSON.parse(localStorage.getItem('students'));
            students.splice(i, 1);
            localStorage.setItem('students', JSON.stringify(students));
            showStudents();
        }

        function exportToExcel() {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            let csv = "\uFEFFስም,ውጤት,ሁኔታ,ፀባይ\n";
            students.forEach(s => csv += `${s.name},${s.score}%,${s.score < 50 ? "ድጋፍ ይፈልጋል" : "ጥሩ"},${s.behavior}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "ተማሪዎች_ሪፖርት.csv";
            link.click();
        }
    </script>
</body>
</html>
