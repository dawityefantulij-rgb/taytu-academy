<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - መምህር ዳዊት</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #27ae60; --g: #f1c40f; --w: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; scroll-behavior: smooth; }
        
        nav { background: var(--p); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=1200'); height: 60vh; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 0 20px; }
        
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        /* Gallery Style */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }

        /* Form Style */
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px 0; }
        .btn-login { background: var(--g); color: var(--p); }
        .btn-save { background: #8e44ad; color: white; width: 100%; }
        .btn-pdf { background: #e67e22; color: white; }
        .btn-add { background: var(--s); color: white; width: 100%; }

        .hidden { display: none; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<nav class="no-print">
    <div style="font-size:1.4rem; font-weight:bold;">ጣይቱ ብጡል አካዳሚ</div>
    <button class="btn btn-login" onclick="showLogin()">Admin Login</button>
</nav>

<div id="homePage">
    <section class="hero">
        <h1>እንኳን ደህና መጡ</h1>
        <p>የጥበብ እና የዕውቀት ማዕከል</p>
    </section>

    <div class="container">
        <div class="card">
            <h3>የተማሪ/ወላጅ መረጃ ቅጽ</h3>
            <form id="parentForm">
                <div class="form-group"><input type="text" placeholder="የተማሪ ስም" required></div>
                <div class="form-group"><input type="text" placeholder="የወላጅ ስም" required></div>
                <div class="form-group">
                    <label>መረጃ በምን ይላክልዎት?</label>
                    <select>
                        <option value="Telegram">Telegram</option>
                        <option value="SMS">በፅሁፍ መልዕክት (SMS)</option>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Call">በቀጥታ ስልክ</option>
                    </select>
                </div>
                <div class="form-group"><textarea placeholder="ተጨማሪ አስተያየት ካለዎት..."></textarea></div>
                <button type="button" class="btn btn-add" onclick="alert('መረጃው ተልኳል!')">መረጃውን ላክ</button>
            </form>
        </div>

        <div class="card">
            <h3>የስራዎቻችን ጋለሪ</h3>
            <div class="gallery" id="mainGallery">
                <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=300">
                <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=300">
            </div>
        </div>
    </div>
</div>

<div id="loginOverlay" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:2000;">
    <div class="card" style="width: 300px; text-align: center;">
        <h3>Admin Access</h3>
        <input type="password" id="passIn" placeholder="Password" style="margin-bottom:15px;">
        <button class="btn btn-add" onclick="checkAuth()">ግባ</button>
        <button class="btn" style="background:#ccc;" onclick="hideLogin()">ዝጋ</button>
    </div>
</div>

<div id="adminArea" class="container hidden">
    <div class="card no-print" style="display:flex; justify-content:space-between; background:#eee;">
        <h2>የአስተዳዳሪ ክፍል</h2>
        <button class="btn" style="background:#e74c3c; color:white;" onclick="location.reload()">Logout</button>
    </div>

    <div class="card no-print">
        <h3>አዲስ ፎቶ ወደ ጋለሪ መጫኛ</h3>
        <input type="file" id="photoUpload" accept="image/*" onchange="previewAndUpload(event)">
        <p style="font-size: 0.8rem; color: #666;">* እዚህ ጋር የሚጭኑት ፎቶ በቀጥታ Homepage ጋለሪ ላይ ይታያል።</p>
    </div>

    <div class="card no-print">
        <label>ክፍል ይምረጡ፡</label>
        <select id="gradeSelect" onchange="loadGrade()">
            <option value="">-- ይምረጡ --</option>
            <option value="6">Grade 6</option><option value="5">Grade 5</option>
            <option value="4">Grade 4</option><option value="3">Grade 3</option>
            <option value="2A">Grade 2A</option><option value="2B">Grade 2B</option>
            <option value="1A">Grade 1A</option><option value="1B">Grade 1B</option>
        </select>
    </div>

    <div id="report-section" class="card">
        <div style="text-align: center; border-bottom: 2px solid #333; margin-bottom: 20px;">
            <h1>ጣይቱ ብጡል አካዳሚ</h1>
            <h3 id="printTitle">የተማሪዎች ውጤት</h3>
            <p>መምህር፡ ዳዊት የማነ | ቀን፡ <span id="currentDate"></span></p>
        </div>
        <div style="overflow-x:auto;">
            <table id="resultTable" border="1" style="width:100%; border-collapse:collapse; text-align:center;">
                <thead>
                    <tr style="background:var(--s); color:white;">
                        <th>ተ.ቁ</th><th>ስም</th><th>ጾታ</th><th>Mid</th><th>Draw</th><th>Theater</th><th>Write</th><th>Group</th><th>60%</th><th>Final</th><th>100%</th><th class="no-print">X</th>
                    </tr>
                </thead>
                <tbody id="sList"></tbody>
            </table>
        </div>
        <button class="btn btn-add no-print" onclick="addNewRow()">+ ተማሪ ጨምር</button>
        <div class="analysis-box" id="analysisBody"></div>
    </div>

    <div class="no-print">
        <button class="btn btn-save" onclick="saveToSheets()">💾 ወደ Google Sheets መረጃውን ላክ (Save)</button>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-pdf" style="flex:1;" onclick="downloadPDF()">📥 በ PDF አውርድ</button>
            <button class="btn btn-add" style="flex:1; background:var(--a);" onclick="window.print()">🖨️ አትም (Print)</button>
        </div>
    </div>
</div>

<script>
    const PASS = "Dawit@0721";
    const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE"; // እዚህ ጋር የGoogle Script URL ይገባል

    function showLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); }
    function hideLogin() { document.getElementById('loginOverlay').classList.add('hidden'); }
    
    function checkAuth() {
        if(document.getElementById('passIn').value === PASS) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('adminArea').classList.remove('hidden');
        } else { alert("የይለፍ ቃል ተሳስቷል!"); }
    }

    // ፎቶ መጫኛ ተግባር
    function previewAndUpload(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const img = document.createElement('img');
            img.src = reader.result;
            document.getElementById('mainGallery').appendChild(img);
            alert("ፎቶው ወደ ጋለሪ ተጭኗል!");
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    function loadGrade() {
        const g = document.getElementById("gradeSelect").value;
        const list = document.getElementById("sList");
        list.innerHTML = "";
        // እዚህ ጋር የተማሪዎች ዝርዝር ዳታቤዝ ይገባል (ከቀድሞው ኮድ የቀጠለ)
        insertRow(1, "Sample Student", "M");
        document.getElementById("currentDate").innerText = new Date().toLocaleDateString();
        calc();
    }

    function insertRow(n, s, g) {
        document.getElementById("sList").innerHTML += `
            <tr>
                <td>${n}</td>
                <td><input type="text" value="${s}"></td>
                <td><select class="s-gn"><option value="M">M</option><option value="F">F</option></select></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td><input type="number" class="val" oninput="calc()"></td>
                <td class="res60">0</td>
                <td><input type="number" class="fin" oninput="calc()"></td>
                <td class="res100">0</td>
                <td class="no-print"><button onclick="this.parentElement.parentElement.remove(); calc()">X</button></td>
            </tr>`;
    }

    function addNewRow() { insertRow(document.getElementById("sList").rows.length + 1, "", "M"); }

    function calc() {
        document.querySelectorAll("#sList tr").forEach(row => {
            let s60 = 0; row.querySelectorAll('.val').forEach(i => s60 += (parseFloat(i.value) || 0));
            row.querySelector('.res60').innerText = s60.toFixed(1);
            let total = s60 + (parseFloat(row.querySelector('.fin').value) || 0);
            row.querySelector('.res100').innerText = total.toFixed(1);
        });
        // ትንተና እዚህ ጋር ይሰራል...
    }

    function saveToSheets() {
        alert("መረጃው ወደ Google Sheets በመላክ ላይ ነው... (Script URL ካስገቡ ይሰራል)");
        // fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
    }

    function downloadPDF() {
        const element = document.getElementById('report-section');
        html2pdf().from(element).save('Student_Result.pdf');
    }
</script>
</body>
</html>
