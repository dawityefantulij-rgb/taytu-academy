<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የታይቱ ቢቱል አካዳሚ - የውጤት መመዝገቢያ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background-color: #f0f4f8; 
        }
        .grade-card { 
            transition: all 0.3s ease; 
            background: white;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .grade-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #2563eb;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <div class="inline-block p-4 bg-white rounded-3xl shadow-sm mb-4 border border-blue-50">
                <h1 class="text-4xl font-black text-blue-900">የታይቱ ቢቱል አካዳሚ</h1>
            </div>
            <p class="text-blue-600 font-bold tracking-wide">የተማሪዎች ውጤት መቆጣጠሪያ ሲስተም</p>
            <div id="syncStatus" class="mt-4 text-xs font-bold px-4 py-2 rounded-full bg-white shadow-sm inline-flex items-center">
                <span class="mr-2">🔄</span> መረጃ ከCloud ጋር በመገናኘት ላይ...
            </div>
        </header>

        <div id="gradeSelection" class="grid grid-cols-2 md:grid-cols-3 gap-6">
            </div>

        <div id="studentSection" class="hidden animate-in fade-in duration-500">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                <div class="bg-blue-900 p-6 flex justify-between items-center">
                    <div>
                        <h2 id="selectedGradeTitle" class="text-2xl font-bold text-white"></h2>
                        <p class="text-blue-200 text-sm">የተማሪዎችን ውጤት እዚህ ይሙሉ</p>
                    </div>
                    <button onclick="backToGrades()" class="bg-blue-800 hover:bg-blue-700 text-white px-4 py-2 rounded-xl transition font-bold border border-blue-700">ተመለስ</button>
                </div>

                <div class="p-6">
                    <div class="overflow-x-auto rounded-2xl border border-gray-100">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="p-4 text-gray-600 font-bold">የተማሪ ስም</th>
                                    <th class="p-4 text-gray-600 font-bold text-center">ውጤት (100%)</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody" class="divide-y divide-gray-50">
                                </tbody>
                        </table>
                    </div>

                    <div class="mt-8">
                        <button id="saveBtn" onclick="saveToCloud()" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white text-xl font-black rounded-2xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center gap-3">
                            <span>💾</span> መረጃውን መዝግብ (Save)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // የአንተ Google Script URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwJ56hcG_ywKTV4k_pWI7hediy40q27Y2q6IjePHMbW2umfwkNUoZXyuiwuBSLn4hxxjw/exec';
        
        let currentGrade = null;
        let allData = {};

        // ገጹ ሲከፈት መረጃውን አምጣ
        window.onload = () => {
            renderGrades();
            fetchData();
        };

        // ክፍሎችን ፍጠር
        function renderGrades() {
            const container = document.getElementById('gradeSelection');
            container.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                container.innerHTML += `
                    <div onclick="showGrade(${i})" class="grade-card p-12 text-center">
                        <div class="text-4xl font-black text-blue-900 mb-2">${i}ኛ</div>
                        <div class="text-blue-500 font-bold text-sm tracking-widest uppercase">ክፍል</div>
                    </div>`;
            }
        }

        // ከCloud ዳታ ማንበብ
        async function fetchData() {
            const status = document.getElementById('syncStatus');
            try {
                const response = await fetch(scriptURL + "?action=read");
                const data = await response.json();
                if (data && Object.keys(data).length > 0) {
                    allData = data;
                    status.innerHTML = "✅ መረጃው ከCloud ጋር ተገናኝቷል (Synced)";
                    status.className = "mt-4 text-xs font-bold px-4 py-2 rounded-full bg-green-100 text-green-700 shadow-sm inline-flex items-center border border-green-200";
                }
            } catch (e) {
                status.innerHTML = "⚠️ ከመስመር ውጭ (Offline) - የድሮ መረጃ ይታያል";
                status.className = "mt-4 text-xs font-bold px-4 py-2 rounded-full bg-yellow-100 text-yellow-700 shadow-sm inline-flex items-center border border-yellow-200";
                const local = localStorage.getItem('taytu_academy_data');
                if (local) allData = JSON.parse(local);
            }
        }

        // የክፍል ተማሪዎችን አሳይ
        function showGrade(grade) {
            currentGrade = grade;
            document.getElementById('gradeSelection').classList.add('hidden');
            document.getElementById('studentSection').classList.remove('hidden');
            document.getElementById('selectedGradeTitle').innerText = grade + "ኛ ክፍል";
            
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';
            
            // 40 ተማሪዎች
            for (let i = 1; i <= 40; i++) {
                const savedVal = (allData[grade] && allData[grade][i]) ? allData[grade][i] : '';
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 transition">
                        <td class="p-4 font-medium text-gray-700">ተማሪ ${i}</td>
                        <td class="p-4">
                            <input type="number" 
                                onchange="updateVal(${i}, this.value)" 
                                value="${savedVal}" 
                                placeholder="0-100"
                                class="w-24 mx-auto block p-3 border-2 border-gray-100 rounded-xl text-center font-bold text-blue-900 focus:border-blue-500 focus:ring-0 outline-none transition">
                        </td>
                    </tr>`;
            }
            window.scrollTo(0, 0);
        }

        // መረጃውን በየጊዜው ሴቭ አድርግ (Local)
        function updateVal(studentId, value) {
            if (!allData[currentGrade]) allData[currentGrade] = {};
            allData[currentGrade][studentId] = value;
            localStorage.setItem('taytu_academy_data', JSON.stringify(allData));
        }

        // ወደ Cloud ላክ
        async function saveToCloud() {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = "<span>⏳</span> በመመዝገብ ላይ...";
            btn.disabled = true;
            btn.style.opacity = "0.7";

            try {
                // መረጃውን ወደ Google Sheet መላክ
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // ኮርርስን ለማለፍ
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        grade: currentGrade, 
                        students: allData[currentGrade] 
                    })
                });
                
                alert("ለ " + currentGrade + "ኛ ክፍል መረጃው በስኬት ተመዝግቧል! አሁን በማንኛውም ዲቫይስ ላይ ይታያል።");
            } catch (e) {
                console.error(e);
                alert("ችግር ተከስቷል! ኢንተርኔት መኖሩን ያረጋግጡ።");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }

        function backToGrades() {
            document.getElementById('gradeSelection').classList.remove('hidden');
            document.getElementById('studentSection').classList.add('hidden');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
